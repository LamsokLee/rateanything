name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Check secrets exist
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Error: VERCEL_TOKEN secret not set"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Error: VERCEL_ORG_ID secret not set"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Error: VERCEL_PROJECT_ID secret not set"
            exit 1
          fi
          if [ -z "$REDIS_URL" ]; then
            echo "Warning: REDIS_URL secret not set — cache will be disabled"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Run DB migrations via Supabase Edge Function
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://kmdbcqbxclgsdchhumpy.supabase.co/functions/v1/migrate" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json")
          echo "Migration response: $RESPONSE"
          echo "$RESPONSE" | jq -e '.success' > /dev/null || exit 1
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Set Vercel environment variables
        run: |
          if [ -n "$REDIS_URL" ]; then
            echo "Setting REDIS_URL in Vercel..."
            # Remove existing env var first to avoid conflicts, then add new one
            vercel env rm REDIS_URL production --yes --token "${{ secrets.VERCEL_TOKEN }}" 2>/dev/null || true
            echo "$REDIS_URL" | vercel env add REDIS_URL production --yes --token "${{ secrets.VERCEL_TOKEN }}"
            echo "REDIS_URL set in Vercel production environment"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        run: vercel deploy --yes --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
