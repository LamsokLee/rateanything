services:
  postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: rateanything
      POSTGRES_PASSWORD: rateanything
      POSTGRES_DB: rateanything
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:8.2-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
volumes:
  pgdata:
  redisdata:
